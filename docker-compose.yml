services:

  auth-service:
    build: ./AuthService
    container_name: auth-service
    ports:
      - "5001:8080"

  product-service:
    build: ./ProductService
    container_name: product-service
    ports:
      - "5002:8080"

  order-service:
    build: ./OrderService
    container_name: order-service
    ports:
      - "5003:8080"

  api-gateway:
    build: ./ApiGateway
    container_name: api-gateway
    ports:
      - "6000:8080"
    depends_on:
      - auth-service
      - product-service
      - order-service